name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config pypi-token.pypi ${{ secrets.GH_TOKEN }}

      - name: Configure GitHub registry
        run: poetry config repositories.github "https://upload.pypi.org/legacy/"

      - name: Publish package
        run: poetry publish --build --username __token__ --password ${{ secrets.GH_TOKEN }}
